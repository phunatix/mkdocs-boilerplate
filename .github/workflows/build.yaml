name: Build MkDocs

on:
  push:
    branches: [ main ]

jobs:
  build_mkdocs:
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.11.2"
      - run: uv venv --clear
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: 3.12
      - run: uv pip install mkdocs-material
      - run: mkdocs gh-deploy --force

